; Override the php-fpm pool so every worker error + PHP error_log call
; ends up on the container stderr (i.e. `docker logs peregrine`).
;
; Catches: Notice / Warning / Error / Deprecated, custom error_log() calls,
; and uncaught exception traces that php-fpm would otherwise dump into a
; per-worker log file.

[www]
user = www-data
group = www-data
listen = 127.0.0.1:9000

pm = dynamic
pm.max_children = 25
pm.start_servers = 3
pm.min_spare_servers = 2
pm.max_spare_servers = 5
pm.max_requests = 500

; Log to stderr instead of a file
access.log = /dev/null
catch_workers_output = yes
decorate_workers_output = no

clear_env = no
