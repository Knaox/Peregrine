# In-image nginx config — used by the official ghcr.io/knaox/peregrine image.
# Pairs with php-fpm running on 127.0.0.1:9000 inside the same container.

server {
    listen 8080 default_server;
    listen [::]:8080 default_server;
    server_name _;

    root /var/www/html/public;
    index index.php;

    charset utf-8;
    client_max_body_size 512M;

    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    # Health check (/up is registered by Laravel)
    location = /up {
        access_log off;
        try_files /dev/null @php;
    }

    # Reverb WebSocket — proxied to the in-cluster supervisor program.
    # HTTP/1.1 is mandatory for the Upgrade header to survive (HTTP/2
    # strips it). Cloudflare orange-cloud proxies WS over 443 on the free
    # plan as long as we keep these headers intact.
    location /app/ {
        proxy_pass http://127.0.0.1:6001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    # Reverb HTTP API (auth/connection metadata). Same proxy block,
    # different path.
    location /apps/ {
        proxy_pass http://127.0.0.1:6001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static assets
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # Never serve hidden files (.env, .git, ...)
    location ~ /\.(?!well-known).* {
        deny all;
    }

    error_page 404 /index.php;

    location @php {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout 300;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        include fastcgi_params;
        fastcgi_read_timeout 300;
    }
}
