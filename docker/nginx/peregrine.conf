# In-image nginx config — used by the official ghcr.io/knaox/peregrine image.
# Pairs with php-fpm running on 127.0.0.1:9000 inside the same container.

server {
    listen 8080 default_server;
    listen [::]:8080 default_server;
    server_name _;

    root /var/www/html/public;
    index index.php;

    charset utf-8;
    client_max_body_size 512M;

    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    # Health check (/up is registered by Laravel)
    location = /up {
        access_log off;
        try_files /dev/null @php;
    }

    # Static assets
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # Never serve hidden files (.env, .git, ...)
    location ~ /\.(?!well-known).* {
        deny all;
    }

    error_page 404 /index.php;

    location @php {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout 300;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        include fastcgi_params;
        fastcgi_read_timeout 300;
    }
}
