# ------------------------------------------------------------------
# Peregrine — app + Redis, external database (BYO-DB)
#
# For operators who already run MySQL / MariaDB / PostgreSQL elsewhere
# (managed DB, separate host, …). Redis stays bundled for cache, queue
# and sessions.
#
# Set the DB_* variables in Portainer "Environment variables" or in a
# .env file next to this compose:
#
#   docker compose -f docker-compose.external-db.yml up -d
#   open http://localhost:8080        (run the Setup Wizard)
# ------------------------------------------------------------------

services:
  peregrine:
    image: ghcr.io/knaox/peregrine:latest
    container_name: peregrine
    restart: unless-stopped
    depends_on:
      redis: { condition: service_started }
    ports:
      - "${PEREGRINE_PORT:-8080}:8080"
    environment:
      APP_URL: ${APP_URL:-http://localhost:8080}
      DOCKER: "true"
      DB_CONNECTION: ${DB_CONNECTION:-mysql}
      DB_HOST: ${DB_HOST:?set DB_HOST to your managed database host}
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE:-peregrine}
      DB_USERNAME: ${DB_USERNAME:-peregrine}
      DB_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD}
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      REDIS_HOST: redis
    volumes:
      - peregrine_storage:/var/www/html/storage
      - peregrine_plugins:/var/www/html/plugins

  redis:
    image: redis:7-alpine
    container_name: peregrine-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - peregrine_redis:/data

volumes:
  peregrine_storage:
  peregrine_plugins:
  peregrine_redis:
