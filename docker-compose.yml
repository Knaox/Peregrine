# ------------------------------------------------------------------
# Peregrine — all-in-one (app + MySQL + Redis) — DEFAULT
#
#   docker compose up -d
#   open http://localhost:8080        (run the Setup Wizard)
#
# Already running a managed database elsewhere ?
#   Use docker-compose.external-db.yml instead.
# ------------------------------------------------------------------

services:
  peregrine:
    image: ghcr.io/knaox/peregrine:latest
    container_name: peregrine
    restart: unless-stopped
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_started }
    ports:
      - "${PEREGRINE_PORT:-8080}:8080"
    environment:
      APP_URL: ${APP_URL:-http://localhost:8080}
      DOCKER: "true"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-peregrine}
      DB_USERNAME: ${DB_USERNAME:-peregrine}
      DB_PASSWORD: ${DB_PASSWORD:-peregrine}
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      REDIS_HOST: redis
    volumes:
      - peregrine_storage:/var/www/html/storage
      - peregrine_plugins:/var/www/html/plugins

  mysql:
    image: mysql:8.4
    container_name: peregrine-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-peregrine}
      MYSQL_USER: ${DB_USERNAME:-peregrine}
      MYSQL_PASSWORD: ${DB_PASSWORD:-peregrine}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-peregrine-root}
    volumes:
      - peregrine_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: peregrine-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - peregrine_redis:/data

volumes:
  peregrine_storage:
  peregrine_plugins:
  peregrine_mysql:
  peregrine_redis:
