<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Dark circle background -->
  <circle cx="100" cy="100" r="95" fill="#1E293B"/>
  <!-- Abstract geometric peregrine falcon -->
  <g transform="translate(100,100)">
    <!-- Body -->
    <path d="M-10,-55 L20,-30 L25,5 L15,40 L5,55 L-5,45 L-15,20 L-20,-10 Z" fill="#F97316"/>
    <!-- Wing left -->
    <path d="M-20,-10 L-55,-25 L-60,-15 L-35,5 L-15,20 Z" fill="#F97316" opacity="0.85"/>
    <!-- Wing right -->
    <path d="M20,-30 L55,-40 L65,-25 L40,-5 L25,5 Z" fill="#F97316" opacity="0.85"/>
    <!-- Head -->
    <path d="M-10,-55 L0,-70 L15,-60 L20,-30 L5,-40 Z" fill="#F97316"/>
    <!-- Eye marking -->
    <circle cx="5" cy="-50" r="4" fill="#1E293B"/>
    <circle cx="5" cy="-50" r="2" fill="#F97316"/>
    <!-- Beak -->
    <path d="M-10,-55 L-18,-50 L-10,-45 Z" fill="#FB923C"/>
    <!-- Tail feathers -->
    <path d="M5,55 L-5,70 L5,65 L15,70 L15,55 Z" fill="#F97316" opacity="0.75"/>
    <!-- Speed lines -->
    <line x1="-50" y1="-35" x2="-65" y2="-30" stroke="#F97316" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <line x1="-45" y1="-20" x2="-65" y2="-18" stroke="#F97316" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
    <line x1="-40" y1="-5" x2="-60" y2="-5" stroke="#F97316" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  </g>
</svg>
