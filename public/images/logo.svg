<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Peregrine Falcon - Minimalist style like Pelican logo -->

  <!-- Falcon silhouette - diving pose (stoop) -->
  <path d="M24 4 C22 4, 19 6, 18 9 L17 12 L10 18 C8 20, 9 22, 11 21 L16 18 L15 24 L12 30 C10 33, 11 35, 13 33 L17 28 L18 34 L17 40 C16 43, 18 44, 20 42 L22 36 L24 44 L26 36 L28 42 C30 44, 32 43, 31 40 L30 34 L31 28 L35 33 C37 35, 38 33, 36 30 L33 24 L32 18 L37 21 C39 22, 40 20, 38 18 L31 12 L30 9 C29 6, 26 4, 24 4Z"
    fill="#f97316"/>

  <!-- Dark hood (peregrine falcon characteristic malar stripe) -->
  <path d="M24 4 C22 4, 19 6, 18 9 L20 10 C21 7, 23 5, 24 5 C25 5, 27 7, 28 10 L30 9 C29 6, 26 4, 24 4Z"
    fill="#1e293b"/>

  <!-- Malar stripe left -->
  <path d="M20 10 L18 14 L20 13Z" fill="#1e293b"/>
  <!-- Malar stripe right -->
  <path d="M28 10 L30 14 L28 13Z" fill="#1e293b"/>

  <!-- Eye left -->
  <circle cx="21.5" cy="9.5" r="1.2" fill="#fbbf24"/>
  <circle cx="21.8" cy="9.3" r="0.5" fill="#1e293b"/>

  <!-- Eye right -->
  <circle cx="26.5" cy="9.5" r="1.2" fill="#fbbf24"/>
  <circle cx="26.8" cy="9.3" r="0.5" fill="#1e293b"/>

  <!-- Beak -->
  <path d="M23 11 L24 13.5 L25 11" fill="#fbbf24" stroke="#fbbf24" stroke-width="0.3" stroke-linejoin="round"/>

  <!-- Chest lighter area -->
  <path d="M21 16 C21 20, 23 28, 24 32 C25 28, 27 20, 27 16 C26 15, 22 15, 21 16Z"
    fill="#fdba74" opacity="0.5"/>
</svg>
