name: Docker image

# Publishes a multi-arch container image to ghcr.io/<owner>/peregrine.
#
# Tag strategy:
#   - push to main              → "latest" + "main"   (both mutable, always overwritten)
#   - tag v1.2.3                → "1.2.3", "1.2", "1"
#   - tag v1.2.3-alpha.1        → "1.2.3-alpha.1"
#   - pull request              → built, not pushed
#
# Builds amd64 + arm64 in parallel on native GitHub runners (no QEMU), then
# merges into a single multi-arch manifest. A weekly cleanup job trims old
# untagged image versions from GHCR.

on:
  push:
    branches: [main]
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Weekly GHCR cleanup (Sunday 04:00 UTC) — removes untagged versions older than 7 days.
    - cron: '0 4 * * 0'

env:
  REGISTRY: ghcr.io
  # GHCR rejects uppercase repo names — use an explicit lowercase value
  # instead of ${{ github.repository }} (which would be "Knaox/Peregrine").
  IMAGE_NAME: knaox/peregrine
  # Opt into Node.js 24 for the docker/* actions (silences deprecation warning).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ---------------------------------------------------------------
  # Parallel per-arch build — native runners, no QEMU
  # ---------------------------------------------------------------
  build:
    if: github.event_name != 'schedule'
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            arch: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64

    runs-on: ${{ matrix.runner }}

    permissions:
      contents: read
      packages: write

    outputs:
      digest-amd64: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          # Push by digest — combined into a manifest list by the `merge` job.
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=${{ github.event_name != 'pull_request' }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}
          provenance: false

      - name: Export digest
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.arch }}
          path: /tmp/digests/*
          retention-days: 1
          if-no-files-found: error

  # ---------------------------------------------------------------
  # Merge the per-arch digests into a multi-arch manifest list
  # ---------------------------------------------------------------
  merge:
    if: github.event_name != 'pull_request' && github.event_name != 'schedule'
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # No per-commit SHA tag — that stack accumulates forever.
          # Users pin to "latest", "main", or a semver tag.
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Create multi-arch manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "${{ steps.meta.outputs.json }}") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}

  # ---------------------------------------------------------------
  # Weekly GHCR cleanup — delete untagged versions > 7 days old
  # ---------------------------------------------------------------
  cleanup:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Delete old untagged versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: peregrine
          package-type: container
          min-versions-to-keep: 10
          delete-only-untagged-versions: 'true'
